<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SnapScape | Premium Image Gallery</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header class="navbar">

        <div class="logo">
            <i class="fa-solid fa-camera-retro"></i>
            <span>SnapScape</span>
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Gallery</a>
            <a href="#">Collections</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>

        <div class="nav-right">

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search Photos...">            </div>

            <button class="theme-btn">
                <i class="fa-solid fa-moon"></i>
            </button>

            <img src="https://i.pravatar.cc/100" class="profile" alt="Profile">

        </div>

    </header>

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <button class="all-btn">
            <i class="fa-solid fa-image"></i>
            All Photos
        </button>

        <h3>CATEGORIES</h3>

        <ul>
            <li>🌿 Nature</li>
            <li>✈️ Travel</li>
            <li>🏙️ City</li>
            <li>🦁 Wildlife</li>
            <li>🍔 Food</li>
            <li>🏛️ Architecture</li>
            <li>🎨 Abstract</li>
        </ul>

    </aside>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <h1>
            Capture Moments,
            <span>Explore Beauty.</span>
        </h1>

        <p>
            Discover breathtaking images from around the world with SnapScape's premium gallery collection.
        </p>

    </section>

    <!-- ================= FILTER BUTTONS ================= -->

   <section class="filters">

    <button class="filter-btn active" data-filter="All">All</button>
    <button class="filter-btn" data-filter="Nature">Nature</button>
    <button class="filter-btn" data-filter="Travel">Travel</button>
    <button class="filter-btn" data-filter="City">City</button>
    <button class="filter-btn" data-filter="Wildlife">Wildlife</button>
    <button class="filter-btn" data-filter="Food">Food</button>
    <button class="filter-btn" data-filter="Architecture">Architecture</button>
    <button class="filter-btn" data-filter="Abstract">Abstract</button>

</section>

    <!-- ================= GALLERY ================= -->

    <section class="gallery" id="gallery">

        <!-- Gallery cards will be generated automatically by gallery.js -->

    </section>

    <!-- ================= JAVASCRIPT ================= -->

    <script src="js/gallery.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
    <script src="js/lightbox.js"></script>

    <!-- Lightbox -->

<div class="lightbox" id="lightbox">

    <span class="close-btn">&times;</span>

    <button class="prev-btn">
        <i class="fa-solid fa-chevron-left"></i>
    </button>

    <img id="lightbox-img" src="" alt="">

    <button class="next-btn">
        <i class="fa-solid fa-chevron-right"></i>
    </button>

</div>
</body>

</html>
